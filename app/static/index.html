<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Asset QA System</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f6f8fb; color: #1f2937; }
    .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06); margin-bottom: 16px; }
    textarea { width: 100%; min-height: 88px; border: 1px solid #d1d5db; border-radius: 10px; padding: 10px; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 10px; background: #2563eb; color: white; border: 0; border-radius: 10px; padding: 10px 16px; cursor: pointer; }
    button.secondary { background: #4b5563; margin-left: 8px; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0b1020; color: #d5e0ff; border-radius: 10px; padding: 12px; }
    .muted { color: #6b7280; font-size: 13px; }
    ul { margin: 6px 0 0 18px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>金融资产问答系统</h2>
      <p class="muted">支持资产行情问答 + 金融知识 RAG 问答</p>
      <textarea id="question" placeholder="例如：BABA 最近 7 天涨跌情况如何？"></textarea>
      <button id="askBtn">提交问题</button>
      <button id="kbStatsBtn" class="secondary">知识库统计</button>
      <button id="kbReindexBtn" class="secondary">重建知识库索引</button>
    </div>

    <div id="result" class="card" style="display:none;">
      <h3>回答</h3>
      <pre id="answer"></pre>
      <div id="meta"></div>
    </div>

    <div id="kbCard" class="card" style="display:none;">
      <h3>知识库状态</h3>
      <pre id="kbInfo"></pre>
    </div>
  </div>

  <script>
    const askBtn = document.getElementById("askBtn");
    const kbStatsBtn = document.getElementById("kbStatsBtn");
    const kbReindexBtn = document.getElementById("kbReindexBtn");
    const questionEl = document.getElementById("question");
    const resultEl = document.getElementById("result");
    const answerEl = document.getElementById("answer");
    const metaEl = document.getElementById("meta");
    const kbCardEl = document.getElementById("kbCard");
    const kbInfoEl = document.getElementById("kbInfo");

    askBtn.addEventListener("click", async () => {
      const question = questionEl.value.trim();
      if (!question) return;
      askBtn.disabled = true;
      askBtn.innerText = "处理中...";
      resultEl.style.display = "block";
      answerEl.innerText = "";
      metaEl.innerHTML = "";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        if (!res.ok) {
          answerEl.innerText = `请求失败: ${data.detail || "未知错误"}`;
          return;
        }
        answerEl.innerText = data.answer;

        const objData = Object.entries(data.objective_data || {})
          .map(([k, v]) => `<li><strong>${k}</strong>: ${v}</li>`)
          .join("");
        const sources = (data.sources || [])
          .slice(0, 6)
          .map(s => `<li><strong>${s.source_type}</strong> - ${s.title}${s.url ? ` (<a href="${s.url}" target="_blank">link</a>)` : ""}</li>`)
          .join("");

        metaEl.innerHTML = `
          <p><strong>路由</strong>: ${data.route}${data.symbol ? ` | <strong>标的</strong>: ${data.symbol}` : ""}</p>
          ${objData ? `<h4>客观数据</h4><ul>${objData}</ul>` : ""}
          ${sources ? `<h4>数据来源</h4><ul>${sources}</ul>` : ""}
        `;
      } catch (err) {
        answerEl.innerText = `请求异常: ${err.message}`;
      } finally {
        askBtn.disabled = false;
        askBtn.innerText = "提交问题";
      }
    });

    kbStatsBtn.addEventListener("click", async () => {
      kbStatsBtn.disabled = true;
      kbStatsBtn.innerText = "读取中...";
      try {
        const res = await fetch("/api/kb/stats");
        const data = await res.json();
        kbCardEl.style.display = "block";
        kbInfoEl.innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        kbCardEl.style.display = "block";
        kbInfoEl.innerText = `读取失败: ${err.message}`;
      } finally {
        kbStatsBtn.disabled = false;
        kbStatsBtn.innerText = "知识库统计";
      }
    });

    kbReindexBtn.addEventListener("click", async () => {
      kbReindexBtn.disabled = true;
      kbReindexBtn.innerText = "重建中...";
      try {
        const res = await fetch("/api/kb/reindex", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ force: true })
        });
        const data = await res.json();
        kbCardEl.style.display = "block";
        kbInfoEl.innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        kbCardEl.style.display = "block";
        kbInfoEl.innerText = `重建失败: ${err.message}`;
      } finally {
        kbReindexBtn.disabled = false;
        kbReindexBtn.innerText = "重建知识库索引";
      }
    });
  </script>
</body>
</html>
